modules:
  jira:projectPage:
    - key: app-infra-project-page
      resource: main
      resolver:
        function: resolver
      title: Secure Code & App Infrastructure Review

  function:
    - key: resolver
      handler: index.handler

resources:
  - key: main
    path: static/hello-world/build

permissions:
  external:
    fetch:
      backend:
        - '*.atlassian.net'
    images:
      - 'harestechnology.com'
      - 'cdn-icons-png.flaticon.com'
      - 'res.cloudinary.com'
  scopes:
    - read:jira-work
    - write:jira-work
    - read:jira-user
    - manage:jira-project
    - storage:app

app:
  runtime:
    name: nodejs24.x
    memoryMB: 1024
    architecture: arm64
id :